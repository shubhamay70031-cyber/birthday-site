<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Priyatama 💚</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#0f2027,#2e8b57,#a8e063);
      background-size: 200% 200%;
      animation: gradientMove 10s ease infinite;
      color:white;
      text-align:center;
      overflow-x:hidden;
    }

    @keyframes gradientMove {
      0% { background-position:0% 50%; }
      50% { background-position:100% 50%; }
      100% { background-position:0% 50%; }
    }

    #intro{
      position:fixed; width:100%; height:100%; background:black;
      display:flex; justify-content:center; align-items:center;
      font-size:5vw; cursor:pointer; padding:10px;
      text-align:center;
    }

    .container{ padding:5vw; display:none; }

    h1{ font-size:8vw; margin:2vh 0; word-wrap:break-word; }
    p{ font-size:4.5vw; margin:2vh 0; max-width:90%; margin-left:auto;margin-right:auto; word-wrap:break-word; }

    button{
      width:90%; max-width:300px; margin:2vh auto;
      padding:12px; border:none; border-radius:25px;
      background:white; color:#2e8b57; font-weight:bold;
      cursor:pointer; transition:0.3s; display:block;
      font-size:4.5vw;
    }
    button:hover{ transform:scale(1.05); }

    #countdown{ font-size:5vw; margin:2vh 0; }

    #secret{ display:none; margin-top:2vh; }
    #secret input{
      padding:10px; border-radius:10px; border:none; width:70%; max-width:250px;
      margin-bottom:1vh; font-size:4vw;
    }

    .typing { border-right:2px solid white; white-space:nowrap; overflow:hidden; }

    @media screen and (max-width: 480px){
      h1{ font-size:7vw; }
      p{ font-size:4vw; }
      button{ font-size:4vw; padding:10px; }
      #countdown{ font-size:4.5vw; }
      #intro{ font-size:6vw; }
    }
  </style>
</head>
<body>

<div id="intro" onclick="start()">📱 Tap to start surprise 💚</div>

<audio id="music" loop>
  <source src="your-song.mp3">
</audio>

<div class="container" id="main">

  <h1 id="title" class="typing"></h1>
  <h2 id="countdown"></h2>
  <p id="message" class="typing"></p>

  <div id="mainOptions">
    <button onclick="window.location.href='abouther.html'">About Her 💚</button>
    <button onclick="window.location.href='game.html'">Play Love Game 💚</button>
    <button onclick="window.location.href='wish.html'">Birthday Wish 💌</button>
    <button onclick="openSecret()">Secret 💖</button>
  </div>

  <!-- SECRET -->
  <div id="secret">
    <input type="password" id="code" placeholder="Enter secret code 💖">
    <button onclick="check()">Unlock</button>
    <div id="secretContent" style="display:none; margin-top:2vh;">
      <img src="special.jpg" style="width:90%; max-width:300px; border-radius:12px;">
      <p>I love you forever 💖 — Shubhamay</p>
    </div>
  </div>

</div>

<script>
function start(){
  intro.style.display="none";
  main.style.display="block";
  music.play();

  // Typing animation
  typeText("title","Happy Birthday Priyatama 💚",100);
  typeText("message","Happy Birthday! 🎉 Wishing you a magical year ahead 💖",50);
}

// Typing function
function typeText(elementId, text, speed=100){
  let i = 0;
  const el = document.getElementById(elementId);
  el.innerHTML = "";
  const interval = setInterval(()=>{
    el.innerHTML += text.charAt(i);
    i++;
    if(i>=text.length) clearInterval(interval);
  }, speed);
}

// Countdown Timer
let target = new Date("March 27, 2026 00:00:00").getTime();
setInterval(()=>{
  let diff = target - Date.now();
  let h = Math.floor((diff/(1000*60*60))%24);
  let m = Math.floor((diff/(1000*60))%60);
  let s = Math.floor((diff/1000)%60);
  document.getElementById("countdown").innerHTML=h+"h "+m+"m "+s+"s 💚";
},1000);

// Secret
function openSecret(){ secret.style.display="block"; }
function check(){
  if(code.value==""){ document.getElementById("secretContent").style.display="block"; }
  else{ alert("Wrong 💔"); }
}
</script>

</body>
</html>
