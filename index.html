<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #2e8b57, #a8e063);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    .container { display:none; padding:20px; }

    h1 { font-size: 28px; }

    button {
      width: 80%;
      max-width: 300px;
      margin: 10px auto;
      padding: 12px;
      border-radius: 20px;
      border:none;
      background:white;
      color:#2e8b57;
    }

    img {
      width: 80%;
      max-width: 260px;
      border-radius: 12px;
      margin-top:10px;
    }

    .section { display:none; }

    /* Intro */
    #intro {
      position:fixed;
      width:100%;
      height:100%;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:22px;
      z-index:999;
    }

    /* 🎮 Falling Game */
    .fall {
      position: fixed;
      top: -20px;
      font-size: 22px;
      cursor: pointer;
      animation: fall 4s linear;
    }

    @keyframes fall {
      to { transform: translateY(110vh); }
    }

    /* Particles */
    .particle {
      position:fixed;
      bottom:0;
      background:#a8e063;
      border-radius:50%;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      to { transform: translateY(-100vh); }
    }

    #fireworks { display:none; margin-top:20px; }

  </style>
</head>

<body>

<div id="intro" onclick="start()">Tap to open your surprise 💚</div>

<audio id="music" loop>
  <source src="your-song.mp3">
</audio>

<div class="container" id="main">

<h1>Happy Birthday Priyatama 💚</h1>
<h2 id="countdown"></h2>

<p>You are my happiness 💖</p>

<!-- 📸 Memories -->
<button onclick="show('m1')">Memory 1</button>
<button onclick="show('m2')">Memory 2</button>

<div id="m1" class="section"><img src="photo1.jpg"></div>
<div id="m2" class="section"><img src="photo2.jpg"></div>

<!-- 🎮 Falling Game -->
<button onclick="startGame()">Play Love Game 💚</button>
<p id="scoreText"></p>

<!-- 🔒 Secret -->
<button onclick="openSecret()">Secret 💌</button>
<div id="secret" style="display:none;">
  <input type="password" id="code" placeholder="Enter code">
  <button onclick="check()">Unlock</button>
  <p id="msg" style="display:none;">I love you forever 💖</p>
</div>

<div id="fireworks">🎆 Happy Birthday My Love 🎂💚</div>

</div>

<script>

function start(){
  intro.style.display="none";
  main.style.display="block";
  music.play();
}

// Countdown
let target=new Date("March 27, 2026 00:00:00").getTime();

setInterval(()=>{
 let diff=target-Date.now();
 if(diff<0){
  countdown.innerHTML="🎉 Today 💚";
  fireworks.style.display="block";
  return;
 }
 let h=Math.floor((diff/(1000*60*60))%24);
 let m=Math.floor((diff/(1000*60))%60);
 let s=Math.floor((diff/1000)%60);
 countdown.innerHTML=h+"h "+m+"m "+s+"s";
},1000);

// Sections
function show(id){
 document.querySelectorAll('.section').forEach(e=>e.style.display='none');
 document.getElementById(id).style.display='block';
}

// 🎮 Falling Game
let score=0;
let gameInterval;

function startGame(){
 score=0;
 scoreText.innerHTML="Score: 0 💚";

 if(gameInterval) clearInterval(gameInterval);

 gameInterval=setInterval(()=>{
  let item=document.createElement("div");
  item.className="fall";

  let good=Math.random()>0.3;

  item.innerHTML = good ? "💚" : "💔";

  item.style.left=Math.random()*90+"vw";

  document.body.appendChild(item);

  item.onclick=()=>{
    if(good){
      score++;
    } else {
      score--;
    }

    scoreText.innerHTML="Score: "+score+" 💚";
    item.remove();

    if(score>=10){
      scoreText.innerHTML="💖 You win! I love you!";
      clearInterval(gameInterval);
    }
  };

  setTimeout(()=>item.remove(),4000);

 },800);
}

// Secret
function openSecret(){ secret.style.display="block"; }

function check(){
 if(code.value=="2703"){
  msg.style.display="block";
 } else alert("Wrong 💔");
}

// Particles
setInterval(()=>{
 let p=document.createElement("div");
 p.className="particle";
 p.style.left=Math.random()*100+"vw";
 p.style.width=p.style.height=(Math.random()*10+5)+"px";
 document.body.appendChild(p);
 setTimeout(()=>p.remove(),6000);
},300);

</script>

</body>
</html>
