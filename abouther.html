<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Priyatama 💚</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#a8e063,#8b2e77);
    color:white;
    text-align:center;
    margin:0;
    padding:10px;
  }

  h1{
    margin:20px 0;
    font-size:30px;
  }

  .about-btn{
    width:90%; max-width:280px;
    padding:12px;
    margin:8px auto;
    border-radius:15px;
    font-weight:bold;
    background:white;
    color:#2e8b57;
    border:none;
    cursor:pointer;
    display:block;
    transition:0.3s;
  }

  .about-btn:hover{
    background:#2e8b57;
    color:white;
    transform:scale(1.05);
  }

  .section{
    display:none;
    margin-top:15px;
    background: rgba(255,255,255,0.1);
    padding:10px;
    border-radius:12px;
  }

  .img-container {
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px 0;
    justify-content:center;
  }

  .img-container img {
    width:90%;
    max-width:300px;
    height:auto;
    border-radius:12px;
  }

  button.back-btn{
    padding:10px 20px;
    margin:20px 0;
    border:none;
    border-radius:20px;
    background:white;
    color:#2e8b57;
    font-weight:bold;
    cursor:pointer;
  }
</style>
</head>
<body>
