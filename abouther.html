<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Her 🤍</title>
  <link rel="icon" href="favicon.png" type="image/png">
<style>
  body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#69a985,#e063d1);
    background-size: 200% 200%;
    animation: gradientMove 10s ease infinite;
    color:white;
    text-align:center;
    overflow-x:hidden;
  }

  @keyframes gradientMove {
    0% { background-position:0% 50%; }
    50% { background-position:100% 50%; }
    100% { background-position:0% 50%; }
  }

  .container {
    padding:5%;
    max-width: 600px;
    margin:auto;
  }

  h1{
    font-size:32px;
    margin: 20px 0 10px;
    line-height:1.2;
    word-wrap: break-word;
  }

  .memory-btn{
    width: 90%;
    max-width: 300px;
    margin: 10px auto;
    padding: 12px;
    border:none;
    border-radius:25px;
    background:white;
    color:#2e8b57;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    display:block;
    transition:0.3s;
  }
  .memory-btn:hover{ transform: scale(1.05); }

  .memory-section{
    display:none;
    margin-top: 20px;
  }

  .memory-section img{
    width: 45%;
    max-width: 150px;
    margin: 5px;
    border-radius:12px;
  }

  #countdown{ font-size:18px; margin:10px 0; }

  /* Typing effect */
  .typing { border-right: 2px solid white; white-space: normal; display: inline-block; overflow: hidden; }

  @media screen and (max-width: 480px){
    h1{ font-size:24px; }
    .memory-btn{ font-size:14px; padding:10px; }
    .memory-section img{ width:45%; max-width:120px; }
    #countdown{ font-size:16px; }
  }
</style>
</head>
<body>

<div class="container">
  <h1 id="title" class="typing">About Her 💚</h1>
  <h2 id="countdown"></h2>

  <!-- Memory Buttons -->
  <button class="memory-btn" onclick="showMemory('m1')">Brains, Beauty, and a whole lot of attitude</button>
  <button class="memory-btn" onclick="showMemory('m2')">Her power house</button>
  <button class="memory-btn" onclick="showMemory('m3')">Blood bond, unbreakable</button>
  <button class="memory-btn" onclick="showMemory('m4')">Study and Learing</button>
  <button class="memory-btn" onclick="showMemory('m5')">She loves to crochet</button>
  <button class="memory-btn" onclick="showMemory('m6')">New chapter:Hostel life begins</button>
  <button class="memory-btn" onclick="showMemory('m7')">First in hills, forever memory</button>
  <button class="memory-btn" onclick="showMemory('m8')">Our first picture, now we’re here</button>
  <button class="memory-btn" onclick="window.location.href='index.html'">Back to Main 💚</button>

  <!-- Memory Sections -->
  <div id="m1" class="memory-section"><img src="photo1.jpg"><img src="photo2.jpg"></div>
  <div id="m2" class="memory-section"><img src="photo3.jpg"><img src="photo4.jpg"></div>
  <div id="m3" class="memory-section"><img src="photo5.jpg"><img src="photo6.jpg"></div>
  <div id="m4" class="memory-section"><img src="photo7.jpg"><img src="photo8.jpg"></div>
  <div id="m5" class="memory-section"><img src="photo9.jpg"><img src="photo10.jpg"></div>
  <div id="m6" class="memory-section"><img src="photo11.jpg"></div>
  <div id="m7" class="memory-section"><img src="photo13.jpg"><img src="photo14.jpg"></div>
  <div id="m8" class="memory-section"><img src="photo15.jpg"><img src="photo16.jpg"></div>

</div>

<script>
  // Typing animation for heading
  typeText("title","About Her 💚",100);

  function typeText(elementId, text, speed=100){
    let i=0;
    const el=document.getElementById(elementId);
    el.innerHTML="";
    const interval=setInterval(()=>{
      el.innerHTML += text.charAt(i);
      i++;
      if(i>=text.length) clearInterval(interval);
    }, speed);
  }

  function showMemory(id){
    document.querySelectorAll('.memory-section').forEach(s=>s.style.display='none');
    document.getElementById(id).style.display='block';
  }

  // Countdown Timer
 // Countdown → Age Counter
let birthday = new Date("March 27, 2005 00:00:00").getTime(); // Priyatama's DOB
let target = new Date("March 27, 2026 00:00:00").getTime();   // Countdown target

let timer = setInterval(() => {
  let now = Date.now();

  if (now < target) {
    // Countdown phase
    let diff = target - now;
    let h = Math.floor((diff/(1000*60*60))%24);
    let m = Math.floor((diff/(1000*60))%60);
    let s = Math.floor((diff/1000)%60);
    document.getElementById("countdown").innerHTML = h + "h " + m + "m " + s + "s 💚";
  } else {
    // Birthday age counting phase
    let ageMs = now - birthday;
    let ageDate = new Date(ageMs);
    let years = ageDate.getUTCFullYear() - 1970;
    let months = ageDate.getUTCMonth();
    let days = ageDate.getUTCDate() - 1;
    let hours = ageDate.getUTCHours();
    let minutes = ageDate.getUTCMinutes();
    let seconds = ageDate.getUTCSeconds();

    document.getElementById("countdown").innerHTML =
      "Happy Birthday! 🎉 Age: " +
      years + "y " + months + "m " + days + "d " + hours + "h " + minutes + "m " + seconds + "s 💚";
  }
}, 1000);
</script>

</body>
</html>
